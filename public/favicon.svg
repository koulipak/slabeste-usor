<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="clip-jos">
      <!-- triunghiul dreapta-jos (navy) — sub diagonala BL→TR -->
      <polygon points="64,0 64,64 0,64"/>
    </clipPath>
    <clipPath id="clip-sus">
      <!-- triunghiul stanga-sus (galben) — deasupra diagonalei BL→TR -->
      <polygon points="0,0 64,0 0,64"/>
    </clipPath>
  </defs>

  <!-- Fundal navy (jumatatea dreapta-jos) -->
  <rect width="64" height="64" rx="14" fill="#1c3461"/>

  <!-- Jumatatea galbena (stanga-sus) -->
  <rect width="64" height="64" rx="14" fill="#f5c227" clip-path="url(#clip-sus)"/>

  <!-- Linie diagonala separatoare (BL → TR) -->
  <line x1="0" y1="64" x2="64" y2="0" stroke="#fff" stroke-width="1.5" opacity="0.3"/>

  <!-- Frunza — contur alb, vizibila pe ambele fonduri -->
  <path d="M32 9 C21 13 12 22 12 32 C12 44 21 52 32 55 C43 52 52 44 52 32 C52 22 43 13 32 9Z"
        fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Nervura centrala -->
  <line x1="32" y1="14" x2="32" y2="53" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Nervuri stanga -->
  <line x1="32" y1="24" x2="22" y2="30" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="33" x2="20" y2="39" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
  <!-- Nervuri dreapta -->
  <line x1="32" y1="24" x2="42" y2="30" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="33" x2="44" y2="39" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
</svg>
