<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-label="Slăbește Ușor logo concept 1">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee05a"/>
      <stop offset="100%" stop-color="#1fa83c"/>
    </linearGradient>
    <linearGradient id="figureGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- ── Badge ────────────────────────────────── -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#0f172a"/>
  <!-- accent turcoaz colț dreapta-sus -->
  <path d="M62,2 L62,22 L42,2 Z" fill="#06b6d4" opacity="0.35"/>

  <!-- ── Bifă: jumătatea stângă = FRUNZĂ ────── -->
  <!-- corpul frunzei (forma bif-left umpluta) -->
  <path d="M11,33 C13,29 17,26 20,28 C22,24 27,30 28,38
           C25,36 22,32 19,33 C15,32 12,30 11,33 Z"
        fill="url(#leafGrad)"/>
  <!-- nervura centrala a frunzei -->
  <line x1="13" y1="32" x2="27" y2="39"
        stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- nervuri secundare -->
  <line x1="17" y1="30" x2="19" y2="36" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
  <line x1="21" y1="30" x2="23" y2="37" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>

  <!-- codiță frunzei / punct de joncțiune -->
  <circle cx="28" cy="39" r="2.5" fill="url(#leafGrad)"/>

  <!-- ── Bifă: jumătatea dreaptă = SILUETĂ ─── -->
  <!-- corpul bif-right = torso siluetă -->
  <path d="M28,39 Q38,24 50,11 C52,9 54,9 54,11
           Q43,27 32,43 Z"
        fill="url(#figureGrad)"/>
  <!-- cap alergator -->
  <circle cx="51" cy="10" r="5.5" fill="url(#figureGrad)"/>
  <!-- brat înainte -->
  <path d="M44,20 Q49,15 53,14"
        stroke="#0891b2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- brat înapoi -->
  <path d="M38,28 Q33,32 31,38"
        stroke="#0891b2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- picior înainte -->
  <path d="M32,43 Q36,50 38,56"
        stroke="url(#figureGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- picior înapoi -->
  <path d="M32,43 Q27,48 25,54"
        stroke="url(#figureGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- ── Text ───────────────────────────────── -->
  <text x="78" y="28"
        font-family="Montserrat,Poppins,'Segoe UI',sans-serif"
        font-weight="800" font-size="20"
        fill="#0f172a" letter-spacing="0.8">SLĂBEȘTE</text>
  <text x="78" y="52"
        font-family="Montserrat,Poppins,'Segoe UI',sans-serif"
        font-weight="800" font-size="20"
        fill="#06b6d4" letter-spacing="0.8">UȘOR</text>
</svg>
