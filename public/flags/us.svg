    <!-- row 1,3,5,7,9 — 6 stars at x=6,17,28,39,50,61 -->
    <circle cx="6"  cy="5"  r="2.2"/><circle cx="17" cy="5"  r="2.2"/><circle cx="28" cy="5"  r="2.2"/><circle cx="39" cy="5"  r="2.2"/><circle cx="50" cy="5"  r="2.2"/><circle cx="61" cy="5"  r="2.2"/>
    <circle cx="6"  cy="16" r="2.2"/><circle cx="17" cy="16" r="2.2"/><circle cx="28" cy="16" r="2.2"/><circle cx="39" cy="16" r="2.2"/><circle cx="50" cy="16" r="2.2"/><circle cx="61" cy="16" r="2.2"/>
    <circle cx="6"  cy="27" r="2.2"/><circle cx="17" cy="27" r="2.2"/><circle cx="28" cy="27" r="2.2"/><circle cx="39" cy="27" r="2.2"/><circle cx="50" cy="27" r="2.2"/><circle cx="61" cy="27" r="2.2"/>
    <circle cx="6"  cy="38" r="2.2"/><circle cx="17" cy="38" r="2.2"/><circle cx="28" cy="38" r="2.2"/><circle cx="39" cy="38" r="2.2"/><circle cx="50" cy="38" r="2.2"/><circle cx="61" cy="38" r="2.2"/>
    <circle cx="6"  cy="49" r="2.2"/><circle cx="17" cy="49" r="2.2"/><circle cx="28" cy="49" r="2.2"/><circle cx="39" cy="49" r="2.2"/><circle cx="50" cy="49" r="2.2"/><circle cx="61" cy="49" r="2.2"/>
    <!-- row 2,4,6,8 — 5 stars offset -->
    <circle cx="11" cy="10" r="2.2"/><circle cx="22" cy="10" r="2.2"/><circle cx="33" cy="10" r="2.2"/><circle cx="44" cy="10" r="2.2"/><circle cx="55" cy="10" r="2.2"/>
    <circle cx="11" cy="21" r="2.2"/><circle cx="22" cy="21" r="2.2"/><circle cx="33" cy="21" r="2.2"/><circle cx="44" cy="21" r="2.2"/><circle cx="55" cy="21" r="2.2"/>
    <circle cx="11" cy="32" r="2.2"/><circle cx="22" cy="32" r="2.2"/><circle cx="33" cy="32" r="2.2"/><circle cx="44" cy="32" r="2.2"/><circle cx="55" cy="32" r="2.2"/>
    <circle cx="11" cy="43" r="2.2"/><circle cx="22" cy="43" r="2.2"/><circle cx="33" cy="43" r="2.2"/><circle cx="44" cy="43" r="2.2"/><circle cx="55" cy="43" r="2.2"/>
