<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="Slăbește Ușor">
  <defs>
    <clipPath id="badge-sus">
      <polygon points="0,0 44,0 0,44"/>
    </clipPath>
  </defs>

  <!-- Badge 44x44 -->
  <g transform="translate(0, 2)">
    <rect width="44" height="44" rx="11" fill="#1c3461"/>
    <rect width="44" height="44" rx="11" fill="#f5c227" clip-path="url(#badge-sus)"/>
    <rect x="1.5" y="1.5" width="41" height="41" rx="10" fill="none" stroke="#e8180c" stroke-width="0.7"/>
    <line x1="0" y1="44" x2="44" y2="0" stroke="#fff" stroke-width="1" opacity="0.25"/>
    <path d="M22 5 C14 8 8 15 8 22 C8 31 14 37 22 40 C30 37 36 31 36 22 C36 15 30 8 22 5Z"
          fill="none" stroke="#ffffff" stroke-width="1.9" stroke-linejoin="round"/>
    <line x1="22" y1="8" x2="22" y2="39" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="17" x2="15" y2="22" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
    <line x1="22" y1="24" x2="14" y2="29" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>
    <line x1="22" y1="17" x2="29" y2="22" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
    <line x1="22" y1="24" x2="30" y2="29" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- Text SLĂBEȘTE navy -->
  <text x="54" y="20" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
        font-size="20" font-weight="400" fill="#1c3461" letter-spacing="1.8">SLĂBEȘTE</text>

  <!-- Text UȘOR galben: UȘ + silueta + R -->
  <text x="55" y="38" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
        font-size="15" font-weight="400" fill="#f5c227" letter-spacing="5">UȘ</text>

  <!-- Silueta om gras in loc de O, pozitionata la ~x=74, capheight y=27..38 -->
  <g transform="translate(73, 27) scale(0.132)">
    <path fill-rule="evenodd" fill="#e8180c" d="
      M37,1 C44,1 50,6 51,13 C52,19 49,25 43,27
      C56,30 64,41 64,53 C64,65 56,74 43,75
      L40,76 L34,76
      C21,74 10,65 10,53 C10,41 18,30 31,27
      C25,25 22,19 23,13 C24,6 30,1 37,1 Z
      M37,34 C29,34 22,42 22,51 C22,61 29,68 37,68
      C45,68 52,61 52,51 C52,42 45,34 37,34 Z
    "/>
    <path d="M14,40 Q5,46 3,56" fill="none" stroke="#e8180c" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M60,40 Q69,46 71,56" fill="none" stroke="#e8180c" stroke-width="4.5" stroke-linecap="round"/>
    <rect x="25" y="74" width="10" height="7" rx="3" fill="#e8180c"/>
    <rect x="39" y="74" width="10" height="7" rx="3" fill="#e8180c"/>
  </g>

  <!-- R dupa silueta -->
  <text x="84" y="38" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
        font-size="15" font-weight="400" fill="#f5c227" letter-spacing="5">R</text>

  <!-- Linie sub UȘOR -->
  <line x1="55" y1="42" x2="138" y2="42" stroke="#f5c227" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
